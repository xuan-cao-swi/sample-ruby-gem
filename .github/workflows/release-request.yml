name: Open release request

on:
  workflow_dispatch:
    inputs:
      names:
        description: Components to release (leave blank to release all components)
        required: false
        default: ""

permissions:
  contents: read

jobs:
  release-request:
    if: ${{ github.repository == 'xuan-cao-swi/sample-ruby-gem' }}
    permissions:
      contents: write # required for creating releases
      pull-requests: write # required for creating release PRs
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/.toys/release/Gemfile
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Open release pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.ref }}
          RELEASE_NAMES: ${{ github.event.inputs.names }}
        run: |
          bundle exec toys release request --yes --verbose \
            "--target-branch=$TARGET_BRANCH" \
            $RELEASE_NAMES \
            < /dev/null
